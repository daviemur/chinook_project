<!-- CAPTION -->
<text x="356" y="464" font-family="serif" font-size="9" fill="#8b7050" font-style="italic" opacity="0.52">Sun Wukong · 孫悟空 · Chinook salmon · Oncorhynchus tshawytscha</text>
<!-- HANDWRITTEN TEXT -->
<text x="28" y="48" font-family="'Comic Sans MS',cursive" font-size="16" fill="#2a1f0e" transform="rotate(-0.5,28,48)">My first ride on a Rickshaw —</text>
<text x="28" y="71" font-family="'Comic Sans MS',cursive" font-size="15.5" fill="#2a1f0e" transform="rotate(0.3,28,71)">Beijing, with a 70 or 80 year old</text>
<text x="28" y="94" font-family="'Comic Sans MS',cursive" font-size="15.5" fill="#2a1f0e" transform="rotate(-0.2,28,94)">man dedicating his life to the</text>
<text x="28" y="117" font-family="'Comic Sans MS',cursive" font-size="16" fill="#2a1f0e" transform="rotate(0.4,28,117)">hutongs and city gates. He took</text>
<text x="28" y="140" font-family="'Comic Sans MS',cursive" font-size="15.5" fill="#2a1f0e" transform="rotate(-0.3,28,140)">me home, introduced me to his</text>
<text x="28" y="163" font-family="'Comic Sans MS',cursive" font-size="15.5" fill="#2a1f0e" transform="rotate(0.2,28,163)">wife and his work. I looked at</text>
<text x="28" y="186" font-family="'Comic Sans MS',cursive" font-size="16" fill="#2a1f0e" transform="rotate(-0.4,28,186)">Tiananmen and I wept.</text>
<text x="28" y="212" font-family="'Comic Sans MS',cursive" font-size="15.5" fill="#2a1f0e" transform="rotate(0.3,28,212)">He had cared so much — about</text>
<text x="28" y="235" font-family="'Comic Sans MS',cursive" font-size="15.5" fill="#2a1f0e" transform="rotate(-0.2,28,235)">his city, his passengers, his craft.</text>
<text x="28" y="258" font-family="'Comic Sans MS',cursive" font-size="15.5" fill="#2a1f0e" transform="rotate(0.5,28,258)">When I returned to Canada, he</text>
<text x="28" y="281" font-family="'Comic Sans MS',cursive" font-size="15.5" fill="#2a1f0e" transform="rotate(-0.3,28,281)">gave me a blank card. A few days</text>
<text x="28" y="304" font-family="'Comic Sans MS',cursive" font-size="15.5" fill="#2a1f0e" transform="rotate(0.2,28,304)">later I got one back with our</text>
<text x="28" y="327" font-family="'Comic Sans MS',cursive" font-size="16" fill="#2a1f0e" transform="rotate(-0.4,28,327)">picture on it.</text>
<text x="28" y="355" font-family="'Comic Sans MS',cursive" font-size="15.5" fill="#2a1f0e" transform="rotate(0.3,28,355)">That's when I knew. The pedicab</text>
<text x="28" y="378" font-family="'Comic Sans MS',cursive" font-size="15.5" fill="#2a1f0e" transform="rotate(-0.2,28,378)">isn't just transport. It's a thread</text>
<text x="28" y="401" font-family="'Comic Sans MS',cursive" font-size="16" fill="#2a1f0e" font-weight="bold" transform="rotate(0.3,28,401)">between people.</text>
<line x1="28" y1="425" x2="196" y2="425" stroke="#8b7050" stroke-width="0.6" opacity="0.35"/>
<text x="28" y="446" font-family="'Comic Sans MS',cursive" font-size="12.5" fill="#8b7050" opacity="0.62">— The Chinook Project</text>
</svg>
